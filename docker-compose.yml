services:
  web:
    build: .
    ports:
      - "8080:80" 
    volumes:
      - .:/var/www/html:cached
    depends_on:
      - db
    command: >
      sh -c "mkdir -p /var/www/html/public/assets/uploads/players
             /var/www/html/public/assets/uploads/player_docs
             /var/www/html/public/assets/uploads/coaches
             /var/www/html/public/assets/uploads/coach_docs
             /var/www/html/public/assets/uploads/officials
             /var/www/html/public/assets/uploads/tournaments
             && chown -R www-data:www-data /var/www/html/public/assets/uploads
             && chmod -R 775 /var/www/html/public/assets/uploads
             && apache2-foreground"

  db:
    image: mariadb:10.4 
    environment:
      MARIADB_ROOT_PASSWORD: root 
      MARIADB_DATABASE: jsca_erp 
      MARIADB_USER: dev_user
      MARIADB_PASSWORD: dev_password
    ports:
      - "3305:3305"
    volumes:
      - db_data:/var/lib/mysql 
      - ./db_init:/docker-entrypoint-initdb.d 

  # --- NEW PHPMYADMIN SECTION ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80" # Access phpMyAdmin at localhost:8081
    environment:
      PMA_HOST: db # Tells phpMyAdmin to connect to your 'db' container
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: