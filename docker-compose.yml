services:
  web:
    build: .
    ports:
      - "8080:80" 
    volumes:
      - .:/var/www/html 
    depends_on:
      - db

  db:
    image: mariadb:10.4 
    environment:
      MARIADB_ROOT_PASSWORD: root 
      MARIADB_DATABASE: jsca_erp 
      MARIADB_USER: dev_user
      MARIADB_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql 
      - ./db_init:/docker-entrypoint-initdb.d 

  # --- NEW PHPMYADMIN SECTION ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80" # Access phpMyAdmin at localhost:8081
    environment:
      PMA_HOST: db # Tells phpMyAdmin to connect to your 'db' container
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: